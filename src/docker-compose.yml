# Локальная среда разработки: PostgreSQL 15 + Redis 7
# Запуск: docker-compose up -d
# Остановка: docker-compose down
# Сброс данных: docker-compose down -v

version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: tariffradar-postgres
    environment:
      POSTGRES_USER: tariffradar
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: tariffradar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tariffradar"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tariffradar-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_in_production}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_in_production}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
